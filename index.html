<html lang="pt-BR">

<title>Confirmação de Presença - Casamento Ana Clara e Miguel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #faf6f0; --gold: #b89a6a; --gold-light: #d4b896;
    --dark: #1a1612; --muted: #7a6f65; --card-bg: #fff;
    --border: #e8ddd2; --green: #4a7c59; --red: #8b3a3a;
  }
  body {
    background: var(--cream);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(184,154,106,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 90%, rgba(184,154,106,0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  .header { text-align: center; margin-bottom: 56px; animation: fadeUp 0.8s ease both; }
  .header .ornament {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }
  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(38px, 6vw, 58px);
    color: var(--dark);
    line-height: 1.1;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }
  .header h1 em { font-style: italic; color: var(--gold); }
  .header .subtitle { font-size: 14px; color: var(--muted); letter-spacing: 1px; }
  .divider { display: flex; align-items: center; gap: 16px; margin: 24px auto; width: 200px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gold-light); }
  .divider-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }
  .search-section { width: 100%; max-width: 520px; animation: fadeUp 0.8s 0.15s ease both; }
  .search-label {
    display: block;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .search-wrapper { position: relative; }
  .search-input {
    width: 100%;
    padding: 16px 48px 16px 20px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--card-bg);
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .search-input::placeholder { color: #ccc; font-style: italic; }
  .search-input:focus { border-color: var(--gold); }
  .search-icon {
    position: absolute; right: 16px; top: 50%;
    transform: translateY(-50%);
    color: var(--gold-light); font-size: 18px; pointer-events: none;
  }
  .results { width: 100%; max-width: 520px; margin-top: 32px; }
  .no-result {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    animation: fadeUp 0.4s ease both;
    line-height: 1.6;
  }
  .hint-chips { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .hint-chip {
    font-family: 'Jost', sans-serif;
    font-style: normal;
    font-size: 12px;
    letter-spacing: 1px;
    background: rgba(184,154,106,0.12);
    padding: 6px 14px;
    border-radius: 2px;
    color: var(--gold);
  }
  .invite-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px;
    margin-bottom: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.05);
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }
  .invite-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(to bottom, var(--gold), var(--gold-light));
  }
  .invite-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
  }
  .person-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }
  .person-row:last-of-type { border-bottom: none; }
  .person-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;

  .you-tag {
    font-family: 'Jost', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(184,154,106,0.1);
    padding: 3px 8px;
    border-radius: 20px;
  }
  .toggle-group { display: flex; gap: 8px; flex-shrink: 0; margin-left: auto; }
  .toggle-btn {
    padding: 7px 18px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--muted);
    white-space: nowrap;
  }
  .toggle-btn:hover { border-color: var(--gold-light); color: var(--dark); }
  .toggle-btn.sim.active { background: var(--green); border-color: var(--green); color: #fff; }
  .toggle-btn.nao.active { background: var(--red); border-color: var(--red); color: #fff; }
  .confirm-btn {
    width: 100%;
    margin-top: 28px;
    padding: 16px;
    background: var(--dark);
    color: var(--cream);
    border: none;
    border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
  }
  .confirm-btn:hover:not(:disabled) { background: var(--gold); }
  .confirm-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .success-msg {
    display: none;
    text-align: center;
    padding: 20px 0 0;
    animation: fadeUp 0.4s ease both;
  }
  .success-msg .icon { font-size: 28px; margin-bottom: 8px; }
  .success-msg p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--green);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

const respostas = {};
const convitesConfirmados = new Set();

function normalize(str) {
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

function buscar(query) {
  if (!query || query.length < 2) return [];
  const q = normalize(query);
  return convites.filter(function(c) {
    return c.pessoas.some(function(p) { return normalize(p).includes(q); });
  });
}

function renderResults(query) {
  const container = document.getElementById('results');

  if (query.length < 2) { container.innerHTML = ''; return; }

  const encontrados = buscar(query);

  if (encontrados.length === 0) {
    const jaConfirmou = convites.some(function(c) {
      return convitesConfirmados.has(c.convite) &&
        c.pessoas.some(function(p) { return normalize(p).includes(normalize(query)); });
    });
    container.innerHTML = jaConfirmou
      ? '<div class="no-result">Este convite já foi confirmado. Obrigado! ✦</div>'
      : '<div class="no-result">Nenhum convidado encontrado com esse nome.</div>';
    return;
  }

  if (encontrados.length > 1) {
    const nomesEncontrados = [];
    encontrados.forEach(function(c) {
      c.pessoas.forEach(function(p) {
        if (normalize(p).includes(normalize(query))) nomesEncontrados.push(p);
      });
    });
    const chips = nomesEncontrados.map(function(n) {
      return '<span class="hint-chip">' + n + '</span>';
    }).join('');
    container.innerHTML =
      '<div class="no-result">' +
        'Encontramos <strong>' + encontrados.length + ' convites</strong> com esse nome.<br>' +
        '<span style="font-size:15px;margin-top:6px;display:block;">Continue digitando o nome completo para identificar o seu convite.</span>' +
        '<div class="hint-chips">' + chips + '</div>' +
      '</div>';
    return;
  }

  // Exatamente 1 — verifica no Sheets se já confirmou
  const c = encontrados[0];
  container.innerHTML = '<div class="no-result" id="checking">Verificando confirmação...</div>';

  fetch(SHEETS_URL + '?convite=' + encodeURIComponent(c.convite))
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.confirmado) {
        container.innerHTML = '<div class="no-result">Este convite já foi confirmado. Obrigado! ✦</div>';
        convitesConfirmados.add(c.convite);
      } else {
        container.innerHTML = renderCard(c, query);
        bindCardEvents(container, query);
      }
    })
    .catch(function() {
      // Se falhar a consulta, mostra o card mesmo assim
      container.innerHTML = renderCard(c, query);
      bindCardEvents(container, query);
    });
  return;

  bindCardEvents(container, query);
}

function bindCardEvents(container, query) {
  container.querySelectorAll('.toggle-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const conviteNome = btn.dataset.convite;
      const pessoa = btn.dataset.pessoa;
      const val = btn.dataset.val === 'true';

      if (!respostas[conviteNome]) respostas[conviteNome] = {};

      respostas[conviteNome][pessoa] = respostas[conviteNome][pessoa] === val ? null : val;

      const row = btn.closest('.person-row');
      row.querySelectorAll('.toggle-btn').forEach(function(b) { b.classList.remove('active'); });
      if (respostas[conviteNome][pessoa] !== null) btn.classList.add('active');

      const card = btn.closest('.invite-card');
      const confirmBtn = card.querySelector('.confirm-btn');
      const grupo = convites.find(function(cv) { return cv.convite === conviteNome; }).pessoas;
      const todosRespondidos = grupo.every(function(p) {
        return respostas[conviteNome] &&
          respostas[conviteNome][p] !== undefined &&
          respostas[conviteNome][p] !== null;
      });
      confirmBtn.disabled = !todosRespondidos;
    });
  });

  container.querySelectorAll('.confirm-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const conviteNome = btn.dataset.convite;
      const card = btn.closest('.invite-card');
      const data = respostas[conviteNome];

      const presentes = Object.keys(data).filter(function(k) { return data[k] === true; });
      const ausentes  = Object.keys(data).filter(function(k) { return data[k] === false; });

      convitesConfirmados.add(conviteNome);

      card.querySelector('.invite-body').style.display = 'none';
      card.querySelector('.confirm-btn').style.display = 'none';
      card.querySelector('.success-msg').style.display = 'block';

      const msg = card.querySelector('.success-msg p');
      if (presentes.length > 0 && ausentes.length === 0) {
        msg.textContent = 'Presença confirmada! Até logo. 🎉';
      } else if (presentes.length === 0) {
        msg.textContent = 'Recebemos sua resposta. Sentiremos sua falta.';
        msg.style.color = 'var(--muted)';
      } else {
        msg.textContent = 'Confirmado! ' + presentes.join(' e ') + (presentes.length === 1 ? ' estará presente.' : ' estarão presentes.');      
      }

      const respostas_envio = Object.keys(data).map(function(pessoa) {
        return { pessoa: pessoa, confirmado: data[pessoa] };
      });
      fetch(SHEETS_URL, {
        redirect: 'follow',
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ convite: conviteNome, respostas: respostas_envio })
      });
    });
  });
}

function renderCard(convite, query) {
  const q = normalize(query);
  const rows = convite.pessoas.map(function(pessoa) {
    const isMatch = normalize(pessoa).includes(q);
    const r = respostas[convite.convite];
    const val = r ? r[pessoa] : null;
    return '<div class="person-row">' +
      '<span class="person-name">' + pessoa +
      '</span>' +
      '<div class="toggle-group">' +
        '<button class="toggle-btn sim ' + (val === true ? 'active' : '') + '" ' +
          'data-convite="' + convite.convite + '" data-pessoa="' + pessoa + '" data-val="true">Presente</button>' +
        '<button class="toggle-btn nao ' + (val === false ? 'active' : '') + '" ' +
          'data-convite="' + convite.convite + '" data-pessoa="' + pessoa + '" data-val="false">Ausente</button>' +
      '</div>' +
    '</div>';
  }).join('');

  const todosRespondidos = convite.pessoas.every(function(p) {
    const r = respostas[convite.convite];
    return r && r[p] !== undefined && r[p] !== null;
  });

  return '<div class="invite-card">' +
    '<div class="invite-name">✦ ' + convite.convite + '</div>' +
    '<div class="invite-body">' + rows + '</div>' +
    '<button class="confirm-btn" data-convite="' + convite.convite + '" ' + (todosRespondidos ? '' : 'disabled') + '>Confirmar Presença</button>' +
    '<div class="success-msg"><div class="icon">✦</div><p></p></div>' +
  '</div>';
}

var timeout;
document.getElementById('search').addEventListener('input', function(e) {
  clearTimeout(timeout);
  timeout = setTimeout(function() { renderResults(e.target.value); }, 200);
});
</script>
<iframe name="hidden_iframe" style="display:none"></iframe>
</body>
</html>
